<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Chinese - Quiz Runner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo" onclick="confirmExit()">
      <span>🐼</span> ABC Chinese
    </div>
    <div id="user-section" class="user-profile-badge">
      <span id="user-avatar">👦</span>
      <span id="user-display-name">Student</span>
    </div>
  </header>

  <main>
    <!-- Quiz wizard container -->
    <div id="quiz-runner-container" class="glass-panel" style="max-width: 800px;">
      
      <!-- Wizard Header -->
      <div class="quiz-wizard-header">
        <button class="btn-secondary" onclick="confirmExit()" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
          ⬅️ Leave Quiz
        </button>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
        <div class="q-badge">
          Q <span id="current-q-num">1</span>/<span id="total-q-num">20</span>
        </div>
      </div>

      <!-- Question Box -->
      <div id="question-area" class="question-container">
        <!-- Rendered dynamically -->
      </div>

      <!-- Controls -->
      <div class="quiz-controls">
        <button id="prev-btn" class="btn-secondary" onclick="navigateQuestion(-1)">Previous</button>
        <button id="next-btn" class="btn-primary" onclick="navigateQuestion(1)">Next ➡️</button>
      </div>

    </div>

    <!-- Results/Review container (initially hidden) -->
    <div id="results-container" class="glass-panel" style="display: none; max-width: 800px; animation: fadeIn 0.5s ease;">
      <div class="results-header">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Congratulations! 🎉</h1>
        <p style="color: var(--text-light); margin-bottom: 1.5rem;">You completed Quiz 1 – 我和家人!</p>
        
        <div class="results-score-circle">
          <div class="percentage" id="result-percent">0%</div>
          <div class="score-fraction" id="result-fraction">0 / 20</div>
        </div>
        
        <button class="btn-primary" onclick="goToDashboard()" style="margin-top: 1rem;">
          Back to Dashboard 🏠
        </button>
      </div>

      <!-- Breakdown / Detailed Review -->
      <div style="margin-top: 3rem;">
        <h2 style="font-size: 1.8rem; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 0.5rem;">
          Question Review & Explanations
        </h2>
        
        <div id="review-list-container" class="review-list">
          <!-- Rendered dynamically -->
        </div>

        <div style="text-align: center; margin-top: 2.5rem;">
          <button class="btn-primary" onclick="goToDashboard()">
            Back to Dashboard 🏠
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>🐼 Made with ❤️ for ABC kids learning Chinese.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    let currentQuestionIndex = 0;
    let answers = {}; // Maps questionId -> userAnswer

    function formatRuby(text) {
      if (!text) return "";
      // Converts "这(zhè)" to "<ruby>这<rt>zhè</rt></ruby>"
      return text.replace(/([\u4e00-\u9fa5])\(([^)]+)\)/g, '<ruby>$1<rt>$2</rt></ruby>');
    }

    document.addEventListener("DOMContentLoaded", () => {
      initAppState();
      if (!STATE.currentKid) {
        alert("Please login first!");
        window.location.href = "index.html";
        return;
      }
      
      const urlParams = new URLSearchParams(window.location.search);
      const quizId = urlParams.get('id') || 1;
      
      const script = document.createElement('script');
      script.src = `quizzes/quiz${quizId}.js`;
      script.onload = () => {
        if (!window.QUIZ_DATA) {
          alert("Error loading quiz questions.");
          return;
        }
        document.getElementById("user-display-name").textContent = STATE.currentKid.nickname;
        document.getElementById("total-q-num").textContent = window.QUIZ_DATA.questions.length;
        renderQuestion();
      };
      script.onerror = () => {
        alert("Could not load the requested quiz.");
        window.location.href = "index.html";
      };
      document.head.appendChild(script);
    });

    function renderQuestion() {
      const q = window.QUIZ_DATA.questions[currentQuestionIndex];
      const container = document.getElementById("question-area");
      
      // Update header info
      document.getElementById("current-q-num").textContent = currentQuestionIndex + 1;
      const progressPercent = ((currentQuestionIndex + 1) / window.QUIZ_DATA.questions.length) * 100;
      document.getElementById("progress-bar").style.width = `${progressPercent}%`;

      // Update Navigation button labels
      const nextBtn = document.getElementById("next-btn");
      if (currentQuestionIndex === window.QUIZ_DATA.questions.length - 1) {
        nextBtn.textContent = "Submit Quiz 🎉";
        nextBtn.style.background = "var(--accent)";
      } else {
        nextBtn.textContent = "Next ➡️";
        nextBtn.style.background = "var(--primary)";
      }

      const prevBtn = document.getElementById("prev-btn");
      prevBtn.style.visibility = (currentQuestionIndex === 0) ? "hidden" : "visible";

      // Render content based on question type
      let htmlContent = "";

      if (q.type === "listening") {
        htmlContent = `
          <div class="question-text">${formatRuby(q.question)}</div>
          <div style="text-align: center; margin: 1.5rem 0;">
            <button class="audio-play-btn" onclick="playTTS('${q.audioText}')">
              🔊 Play Voice Prompt (听力)
            </button>
            <div style="color: var(--text-light); font-size: 0.95rem; font-style: italic; margin-top: 0.5rem;">
              Click to listen to the Chinese sentence
            </div>
          </div>
          <div class="options-grid">
            ${q.options.map(opt => `
              <button class="option-btn ${answers[q.id] === opt.key ? 'selected' : ''}" onclick="selectAnswer(${q.id}, '${opt.key}')">
                <span class="option-letter">${opt.key}</span>
                <span>${opt.text}</span>
              </button>
            `).join("")}
          </div>
        `;
      } else if (q.type === "image-match") {
        htmlContent = `
          <div class="question-text">${formatRuby(q.question)}</div>
          <img src="${q.image}" class="question-illustration" alt="Matching illustration">
          <div class="options-grid">
            ${q.options.map(opt => `
              <button class="option-btn ${answers[q.id] === opt.key ? 'selected' : ''}" onclick="selectAnswer(${q.id}, '${opt.key}')">
                <span class="option-letter">${opt.key}</span>
                <span>${opt.text}</span>
              </button>
            `).join("")}
          </div>
        `;
      } else if (q.type === "choice") {
        htmlContent = `
          <div class="question-text">${formatRuby(q.question)}</div>
          <div class="options-grid">
            ${q.options.map(opt => `
              <button class="option-btn ${answers[q.id] === opt.key ? 'selected' : ''}" onclick="selectAnswer(${q.id}, '${opt.key}')">
                <span class="option-letter">${opt.key}</span>
                <span>${opt.text}</span>
              </button>
            `).join("")}
          </div>
        `;
      } else if (q.type === "text") {
        htmlContent = `
          <div class="question-text">${formatRuby(q.question)}</div>
          <textarea 
            id="text-input-${q.id}" 
            class="text-answer-input" 
            placeholder="Type your Chinese answer here..."
            oninput="saveTextAnswer(${q.id}, this.value)"
          >${answers[q.id] || ""}</textarea>
          <div style="color: var(--text-light); font-size: 0.95rem; margin-top: -0.5rem;">
            Tip: You can use a Chinese keyboard/pinyin input to type your answer!
          </div>
        `;
      }

      container.innerHTML = htmlContent;
    }

    function selectAnswer(questionId, optionKey) {
      answers[questionId] = optionKey;
      renderQuestion();
    }

    function saveTextAnswer(questionId, value) {
      answers[questionId] = value;
    }

    function navigateQuestion(step) {
      // Validate that an answer is entered/selected before moving on (optional, let's allow skipping but prompt)
      const q = window.QUIZ_DATA.questions[currentQuestionIndex];
      
      if (step === 1 && !answers[q.id]) {
        if (!confirm("You haven't answered this question yet. Do you want to continue?")) {
          return;
        }
      }

      if (currentQuestionIndex + step >= window.QUIZ_DATA.questions.length) {
        // Submit quiz
        submitQuiz();
      } else {
        currentQuestionIndex += step;
        renderQuestion();
      }
    }

    function submitQuiz() {
      const urlParams = new URLSearchParams(window.location.search);
      const quizId = parseInt(urlParams.get('id') || 1);
      const resultObj = gradeQuiz(quizId, answers);
      if (!resultObj) return;

      // Hide runner, show results
      document.getElementById("quiz-runner-container").style.display = "none";
      document.getElementById("results-container").style.display = "block";

      // Render Score card
      document.getElementById("result-percent").textContent = `${resultObj.percentage}%`;
      document.getElementById("result-fraction").textContent = `${resultObj.score} / ${resultObj.total}`;

      // Render Review List
      const reviewContainer = document.getElementById("review-list-container");
      
      const reviewHtml = window.QUIZ_DATA.questions.map((q, idx) => {
        const itemResult = resultObj.results.find(r => r.questionId === q.id);
        const statusClass = itemResult.isCorrect ? "correct" : "incorrect";
        const statusText = itemResult.isCorrect ? "✨ Correct!" : "❌ Try Again";
        
        let answerCompareHtml = "";
        if (q.type === "text") {
          answerCompareHtml = `
            <div class="review-ans-grid">
              <div><strong>Your Answer:</strong> ${itemResult.userAnswer || "<em style='color:red;'>Left Blank</em>"}</div>
              <div style="margin-top: 0.5rem;"><strong>Reference Answer:</strong> <span style="color: var(--accent); font-weight: bold;">${q.referenceAnswer}</span></div>
            </div>
          `;
        } else {
          // Find option texts
          const userOpt = q.options.find(o => o.key === itemResult.userAnswer);
          const correctOpt = q.options.find(o => o.key === q.answer);
          
          answerCompareHtml = `
            <div class="review-ans-grid">
              <div><strong>Your Answer:</strong> ${userOpt ? `${userOpt.key}. ${userOpt.text}` : "<em style='color:red;'>Left Blank</em>"}</div>
              <div><strong>Correct Answer:</strong> <span style="color: var(--accent); font-weight: bold;">${correctOpt.key}. ${correctOpt.text}</span></div>
            </div>
          `;
        }

        return `
          <div class="review-item ${statusClass}">
            <div class="review-status-tag">${statusText}</div>
            <div class="review-q-text">Q${idx + 1}. ${formatRuby(q.question)}</div>
            ${q.type === 'listening' ? `<div style="font-size:0.95rem; margin-bottom: 0.8rem;">📢 Audio said: <strong>${q.audioText}</strong> (${q.pinyin})</div>` : ''}
            ${answerCompareHtml}
            <div class="review-explanation">
              <strong>Explanation:</strong> ${itemResult.explanation}
            </div>
          </div>
        `;
      }).join("");

      reviewContainer.innerHTML = reviewHtml;
    }

    function confirmExit() {
      if (confirm("Are you sure you want to exit the quiz? Your current answers will not be saved.")) {
        goToDashboard();
      }
    }

    function goToDashboard() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
